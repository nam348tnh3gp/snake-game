name: Build Snake Game

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame

    - name: Build with PyInstaller (Windows)
      shell: pwsh
      run: |
        $addDataArgs = @()
        @("eat.wav", "gameover.wav", "frenzy.wav", "obstacle.wav") | ForEach-Object {
          if (Test-Path $_) {
            $addDataArgs += "--add-data"
            $addDataArgs += "${_};."
          } else {
            Write-Host "Audio file $_ not found, skipping."
          }
        }
        $cmd = "pyinstaller --onefile --windowed --name SnakeGame $addDataArgs game.py"
        Write-Host "Executing: $cmd"
        Invoke-Expression $cmd
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGame-Windows
        path: dist/SnakeGame.exe
        compression-level: 6

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsdl2-2.0-0 \
          libsdl2-mixer-2.0-0 \
          libsdl2-image-2.0-0 \
          libsdl2-ttf-2.0-0 \
          x11-apps
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame

    - name: Build with PyInstaller (Linux)
      shell: bash
      run: |
        ADD_DATA_ARGS=()
        for file in eat.wav gameover.wav frenzy.wav obstacle.wav; do
          if [ -f "$file" ]; then
            ADD_DATA_ARGS+=("--add-data" "${file}:.")
          else
            echo "Audio file $file not found, skipping."
          fi
        done
        echo "Add data args: ${ADD_DATA_ARGS[@]}"
        pyinstaller --onefile --windowed --name SnakeGame "${ADD_DATA_ARGS[@]}" game.py
        chmod +x dist/SnakeGame
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGame-Linux
        path: dist/SnakeGame
        compression-level: 6

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Organize release files
      run: |
        mkdir -p release
        cp artifacts/SnakeGame-Windows/SnakeGame.exe release/SnakeGame_windows_${{ github.ref_name }}.exe
        cp artifacts/SnakeGame-Linux/SnakeGame release/SnakeGame_linux_${{ github.ref_name }}
        chmod +x release/SnakeGame_linux_${{ github.ref_name }}
    
    - name: Create checksums
      run: |
        cd release
        sha256sum * > checksums.txt
        cat checksums.txt
    
    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        name: Snake Game ${{ github.ref_name }}
        body: |
          ## 🎮 Snake Game Pro Max - The Final Chapter
          
          ### 📥 Download for your platform:
          - **Windows**: `SnakeGame_windows_${{ github.ref_name }}.exe`
          - **Linux**: `SnakeGame_linux_${{ github.ref_name }}`
          
          ### ✨ Features:
          - 🐍 Classic snake gameplay with modern twists
          - 🌟 Multiple food types (Golden, Blue, Purple)
          - ⚡ Frenzy mode for extra speed and invincibility
          - 🧱 Wall mode toggle
          - 🚧 Dynamic obstacles
          - 📊 High score tracking
          
          ### 🎮 Controls:
          - **Arrow Keys / WASD**: Move
          - **P**: Pause
          - **W**: Toggle Wall Mode
          - **SPACE**: Start/Restart
          - **ESC**: Quit
          
          ### 📝 Note:
          - File `highscore.txt` sẽ được tạo tự động khi chơi.
          - Nếu không có file âm thanh (`.wav`), game vẫn chạy bình thường nhưng không có tiếng.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
